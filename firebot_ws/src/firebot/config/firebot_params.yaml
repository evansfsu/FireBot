fire_detector_node:
  ros__parameters:
    # YOLO11 weights (place in FireBot/models/)
    model_path: "/models/best_small.pt"
    confidence_threshold: 0.2
    inference_imgsz: 512
    max_det: 3
    fire_only: true
    fire_class_name: "Fire"
    camera_width: 640
    camera_height: 480
    detection_fps: 2.0

brain_node:
  ros__parameters:
    confidence_threshold: 0.6
    fire_label: "Fire"
    vision_trigger_confidence: 0.6
    vision_trigger_duration_sec: 10.0
    alarm_wait_timeout_sec: 30.0
    user_confirmation_timeout_sec: 30.0
    centering_tolerance: 0.05
    approach_distance_cm: 50.0
    rotation_speed: 0.5
    drive_speed: 80.0
    search_timeout_sec: 30.0
    warning_countdown_sec: 5
    discharge_duration_sec: 8.0

arduino_bridge_node:
  ros__parameters:
    serial_port: "/dev/ttyACM0"
    baud_rate: 115200
    sensor_poll_hz: 10.0
