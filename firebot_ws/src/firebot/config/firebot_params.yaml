fire_detector_node:
  ros__parameters:
    model_path: "/models/fire_model.pt"
    confidence_threshold: 0.6
    camera_width: 640
    camera_height: 480
    detection_fps: 2.0

brain_node:
  ros__parameters:
    confidence_threshold: 0.6
    centering_tolerance: 0.05
    approach_distance_cm: 50.0
    rotation_speed: 0.5
    drive_speed: 80.0
    search_timeout_sec: 30.0
    warning_countdown_sec: 5
    discharge_duration_sec: 8.0

arduino_bridge_node:
  ros__parameters:
    serial_port: "/dev/ttyACM0"
    baud_rate: 115200
    sensor_poll_hz: 10.0
